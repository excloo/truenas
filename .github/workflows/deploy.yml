name: Deploy

on:
  push:
    paths:
      - "**"
  workflow_dispatch:
    inputs:
      server:
        description: "Server to deploy or leave empty for all"
        required: false
      service:
        description: "Service to deploy or leave empty for all"
        required: false

concurrency:
  cancel-in-progress: true
  group: deploy

jobs:
  changed-files:
    name: Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Select Targets
        id: targets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.server }}" ] && [ -n "${{ inputs.service }}" ]; then
            TARGETS=$(printf '%s\n' "${{ inputs.server }}/${{ inputs.service }}")
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.server }}" ]; then
            TARGETS=$(find "${{ inputs.server }}" -maxdepth 1 -mindepth 1 -type d -printf '%p\n')
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.service }}" ]; then
            TARGETS=$(find . -maxdepth 2 -mindepth 2 -type d -name "${{ inputs.service }}" -printf '%P\n')
          else
            TARGETS=$(find . -maxdepth 2 -mindepth 2 -type d ! -path './.*' -printf '%P\n')
          fi
          printf '%s\n' "$TARGETS" | jq -Rsc '[split("\n")[] | select(test("^[^./][^/]*/[^/]+$")) | split("/") as $parts | {path: ., secret_name: ("AGE_KEY_" + ($parts[0] | ascii_upcase | gsub("-"; "_"))), server: $parts[0], service: $parts[1]}]' | sed 's/^/targets=/' >> "$GITHUB_OUTPUT"

  deploy:
    if: needs.changed-files.outputs.matrix != '[]'
    name: Deploy
    needs: [changed-files]
    runs-on: [self-hosted, "${{ matrix.target.server }}-privileged"]
    defaults:
      run:
        working-directory: ${{ matrix.target.path }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.changed-files.outputs.matrix) }}
    env:
      SERVER: ${{ matrix.target.server }}
      SERVICE: ${{ matrix.target.service }}
      SOPS_AGE_KEY: ${{ secrets[matrix.target.secret_name] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Setup midclt
        run: uv tool install --python 3.12 git+https://github.com/truenas/api_client.git
      - name: Decrypt Files
        run: find . -type f | xargs grep -l 'BEGIN AGE ENCRYPTED FILE' | xargs -r sops --decrypt --in-place
      - name: Deploy Custom Services
        run: |
          if [ -f compose.json ]; then
            echo "Deploying custom service $SERVICE"
            if midclt call app.get_instance "$SERVICE" > /dev/null 2>&1; then
              midclt call -j app.update "$SERVICE" "$(jq -c '{custom_compose_config, custom_compose_config_string}' compose.json)" > /dev/null
              echo "✓ $SERVICE updated"
            else
              echo "$SERVICE not found; creating custom service"
              midclt call -j app.create "$(jq -c . compose.json)" > /dev/null
              echo "✓ $SERVICE created"
            fi
          fi
      - name: Deploy Catalog Services
        run: |
          if [ -f app.json ]; then
            echo "Deploying catalog service $SERVICE"
            if midclt call app.get_instance "$SERVICE" > /dev/null 2>&1; then
              # Desired values are an overlay so stripped values files keep current
              # TrueNAS defaults and unmanaged chart keys intact.
              CURRENT="$(midclt call app.config "$SERVICE" | jq -c 'del(.ix_context, .ix_volumes, .ix_certificates, .ix_certificate_authorities)')"
              VALUES="$(jq -c --argjson current "$CURRENT" '.values as $desired | $current * $desired' app.json)"
              midclt call -j app.update "$SERVICE" "$(jq -c -n --argjson values "$VALUES" '{values: $values}')" > /dev/null
              echo "✓ $SERVICE updated"
            else
              echo "$SERVICE not found; creating catalog service"
              midclt call -j app.create "$(jq -c . app.json)" > /dev/null
              echo "✓ $SERVICE created"
            fi
          fi
      - name: Push Config Files
        run: |
          find . -mindepth 2 -type f ! -name "app.json" ! -name "compose.json" | while read -r f; do
            CONTAINER_DIR="$(echo "$f" | cut -d'/' -f1-2)/"
            CONTAINER_SERVICE=$(basename "$CONTAINER_DIR")
            CONTAINER=$(docker ps --format '{{.Names}}' | grep -m1 "^ix-${SERVICE}-${CONTAINER_SERVICE}-" || true)
            if [ -z "$CONTAINER" ] && [ "$CONTAINER_SERVICE" != "$SERVICE" ]; then
              CONTAINER=$(docker ps --format '{{.Names}}' | grep -m1 "^ix-${SERVICE}-${SERVICE}-" || true)
            fi
            if [ -n "$CONTAINER" ]; then
              docker cp "$f" "$CONTAINER:/${f#"$CONTAINER_DIR"}"
              echo "✓ $CONTAINER:/${f#"$CONTAINER_DIR"}"
            else
              echo "⚠ no container found matching ix-${SERVICE}-${CONTAINER_SERVICE}-* or ix-${SERVICE}-${SERVICE}-*"
            fi
          done
