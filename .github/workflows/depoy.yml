name: Deploy

on:
  push:
    paths:
      - '**'

jobs:
  changed-files:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed-files.outputs.all_changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Changed Files
        uses: tj-actions/changed-files@v47
        id: changed-files
        with:
          dir_names: true
          dir_names_max_depth: 1
          dir_names_exclude_current_dir: true
          files_ignore: '.*/**'
          matrix: true

  deploy:
    if: needs.changed-files.outputs.matrix != '[]'
    needs: [changed-files]
    runs-on: [self-hosted, "${{ matrix.target }}"]
    strategy:
      fail-fast: false
      matrix: 
        target: ${{ fromJSON(needs.changed-files.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup SOPS
        uses: nhedger/setup-sops@v2
      - name: Decrypt Files
        env:
          SOPS_AGE_KEY: ${{ secrets[format('AGE_KEY_{0}', matrix.target)] }}
        run: |
          find "${{ matrix.target }}" -type f | while read -r f; do
            sops --decrypt "$f" > "$f.dec" 2>/dev/null || cp "$f" "$f.dec"
          done
      - name: Deploy Compose Apps
        run: |
          find "${{ matrix.target }}" -maxdepth 2 -name "compose.yaml.dec" | while read -r f; do
            APP=$(basename $(dirname "$f"))
            curl -fks \
              -H "Authorization: Bearer $TRUENAS_API_KEY" \
              -H "Content-Type: application/json" \
              -X PUT "$TRUENAS_HOST/api/v2.0/app/$APP" \
              -d "$(jq -n --arg c "$(cat $f)" '{custom_app:true,custom_compose_config_string:$c}')" \
            2>/dev/null && echo "✓ $APP updated" && continue
            curl -fks \
              -H "Authorization: Bearer $TRUENAS_API_KEY" \
              -H "Content-Type: application/json" \
              -X POST "$TRUENAS_HOST/api/v2.0/app" \
              -d "$(jq -n --arg name "$APP" --arg c "$(cat $f)" '{app_name:$name,custom_app:true,custom_compose_config_string:$c}')" \
            && echo "✓ $APP created" || echo "✗ $APP failed"
          done
      - name: Push Config Files
        run: |
          find "${{ matrix.target }}" -mindepth 3 -type f ! -name "compose.yaml*" ! -name "truenas.json*" -name "*.dec" | while read -r f; do
            original="${f%.dec}"
            container_dir=$(echo "$original" | cut -d'/' -f1-3)/
            CONTAINER=$(basename $(dirname "$container_dir"))
            docker inspect "$CONTAINER" &>/dev/null \
              && docker cp "$f" "$CONTAINER:/${original#$container_dir}" \
              && echo "✓ $CONTAINER:/${original#$container_dir}" \
              || echo "⚠ $CONTAINER not running"
          done
      - name: Update App Environment & Labels
        run: |
          find "${{ matrix.target }}" -name "truenas.json.dec" | while read -r f; do
            CONTAINER=$(basename $(dirname "$f"))
            curl -fks \
              -H "Authorization: Bearer $TRUENAS_API_KEY" \
              -H "Content-Type: application/json" \
              -X PUT "$TRUENAS_HOST/api/v2.0/app/$CONTAINER" \
              -d "$(jq '{values:{containerConfig:{env:[.env//{}|to_entries[]|{name:.key,value:(.value|tostring)}]},labels:(.labels//{})}}' "$f")" \
            && echo "✓ $CONTAINER" || echo "✗ $CONTAINER"
          done
